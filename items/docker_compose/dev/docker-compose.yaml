services:
  backend_django:
    build:
      context: ../../backend
      dockerfile: Dockerfile.dev
    container_name: items_backend
    env_file:
      - .env
    ports:
      - ${DJANGO_PORT}:8000
    volumes:
      - ../../backend/items:/app/items
    depends_on:
      - db_items

  db_items:
    image: postgres
    container_name: postgres_items
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - postgres_data_items:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_items
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - ${PGADMIN_PORT}:80
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db_items

volumes:
  postgres_data_items:
  pgadmin_data:
